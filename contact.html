<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | TalkCyber360</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <nav>
            <div class="logo">
                <figure>
                    <img src="Images/talk_cyber_logo.png" alt="TalkCyber360 Logo" style="width: 200px; height: 200px;">
                </figure>
            </div>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="code-recon.html">CodeRecon</a></li>
                <li><a href="community.html">Community</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section>
            <h2>Contact Us</h2>
            <p>Ready to partner with TalkCyber360 or join our next bootcamp? Reach out below.</p>
            <form id="contact-form">
                <input type="text" placeholder="Name" required style="display:block; margin: 10px 0; width: 100%;">
                <input type="email" placeholder="Email" required style="display:block; margin: 10px 0; width: 100%;">
                <textarea placeholder="Message" required
                    style="display:block; margin: 10px 0; width: 100%; height: 100px;"></textarea>
                <button type="submit"
                    style="background: var(--accent-blue); color: var(--bg-color); border: none; padding: 10px 20px; cursor: pointer;">Send
                    Message</button>
            </form>
        </section>
    </main><br>


    <footer>
        <p>&copy; 2026 TalkCyber360 | All rights reserved</p>
    </footer>
</body>

</html>
